<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Foto + Saat + Footer</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  background: black;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  position: relative;
}

.container {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 20px;
}

img {
  width: 150px;
  height: auto;
}

#clock {
  font-size: 100px;
  color: white;
  text-shadow: 3px 3px 10px black;
  line-height: 1;
}

#footer {
  position: fixed;
  right: 20px;
  bottom: 60px; /* öncekinden biraz yukarı taşıdık */
  color: white;
  font-size: 16px;
  font-weight: bold;
  text-shadow: 2px 2px 5px black;
}
</style>
</head>
<body>

<div class="container">
  <img src="https://i.ibb.co/8LRt5JP8/image.jpg" alt="Logo">
  <div id="clock"></div>
</div>

<div id="footer">ÖTB 9B</div>

<script>
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById("clock").textContent = h + ":" + m + ":" + s;
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
